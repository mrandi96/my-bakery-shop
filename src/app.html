<!doctype html>
<html lang="id">
	<head>
		<meta charset="utf-8" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link rel="dns-prefetch" href="https://fonts.googleapis.com">
		<link rel="dns-prefetch" href="https://fonts.gstatic.com">
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Kue Kito - Pusat oleh-oleh khas Bengkulu terbaik. Menyajikan kue tradisional otentik: Bay Tat, Bolu Koja, Lapis Legit, dan Kue Siput. Pesan mudah via WhatsApp." />
		<meta name="keywords" content="oleh-oleh bengkulu, kue bengkulu, bay tat bengkulu, bolu koja, kue tradisional bengkulu, souvenir bengkulu, bengkulu pastries, traditional cakes" />
		
		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://kuekito.com/" />
		<meta property="og:title" content="Kue Kito - Toko Kue & Oleh-oleh Khas Bengkulu" />
		<meta property="og:description" content="Rasakan cita rasa otentik Bengkulu melalui koleksi kue tradisional kami. Bay Tat, Bolu Koja, dan lainnya." />
		<meta property="og:image" content="/baytat.webp" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://kuekito.com/" />
		<meta property="twitter:title" content="Kue Kito - Toko Kue & Oleh-oleh Khas Bengkulu" />
		<meta property="twitter:description" content="Rasakan cita rasa otentik Bengkulu melalui koleksi kue tradisional kami. Bay Tat, Bolu Koja, dan lainnya." />
		<meta property="twitter:image" content="/baytat.webp" />

		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "Bakery",
			"name": "Kue Kito",
			"image": "https://kuekito.com/baytat.webp",
			"@id": "https://kuekito.com/",
			"url": "https://kuekito.com/",
			"telephone": "+6282183904974",
			"address": {
				"@type": "PostalAddress",
				"streetAddress": "Jl. Cimanuk Komplek Cimanuk Indah No. 10 RT 5 RW 2 Kec. Gading Cempaka",
				"addressLocality": "Bengkulu",
				"postalCode": "38225",
				"addressCountry": "ID"
			},
			"geo": {
				"@type": "GeoCoordinates",
				"latitude": -3.8242,
				"longitude": 102.3023
			},
			"openingHoursSpecification": {
				"@type": "OpeningHoursSpecification",
				"dayOfWeek": [
					"Monday",
					"Tuesday",
					"Wednesday",
					"Thursday",
					"Friday",
					"Saturday",
					"Sunday"
				],
				"opens": "08:00",
				"closes": "20:00"
			},
			"sameAs": [
				"https://facebook.com/kuekito",
				"https://instagram.com/kuekito"
			]
		}
		</script>

		<meta name="text-scale" content="scale" />
		<link rel="icon" href="/favicon.png" />
		<link rel="alternate" type="application/json" href="/ai-plugin.json" />
		<link rel="help" href="/llms.txt" />
		<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&family=Noto+Serif:wght@600;700&display=swap" rel="stylesheet">
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
